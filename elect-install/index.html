  @page {size:letter portrait; margin:0.08in;}
  html,body{margin:0!important;padding:0!important;background:#fff!important;color:#1F2937!important;font-size:7.8pt!important;line-height:1.08!important;}

  table.mat-table tr{break-inside:avoid!important;page-break-inside:avoid!important;}

  @page {margin:0.05in!important;}
  .form-page{padding:4px 7px!important;}
  table.mat-table{font-size:6pt!important;}
