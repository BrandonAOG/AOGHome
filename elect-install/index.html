/* ==================== FINAL PRINT STYLES (Safari Mobile Fixed) ==================== */
@media print {
  body { background: yellow !important; } /* ← TEST COLOR: if you see yellow, rules are working */

  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }

  @page { size: letter portrait; margin: 0.08in; }

  html, body {
    margin: 0 !important; padding: 0 !important;
    background: #fff !important; color: #1F2937 !important;
    font-size: 7.8pt !important; line-height: 1.08 !important;
  }

  .action-bar, .theme-toggle-btn, .notice, .add-ts-btn, .ts-remove-btn { display: none !important; }

  .form-page {
    padding: 5px 8px !important;
    break-after: page !important;
    page-break-after: always !important;
  }

  .form-page:last-child { break-after: avoid !important; }

  /* Page 1 */
  #page1 .checklist-title { font-size: 12pt !important; }
  #page1 .section-title { font-size: 8.2pt !important; }
  #page1 .section-row, #page1 .field-row label, #page1 .footer-field label { font-size: 7.8pt !important; }
  #page1 input, #page1 textarea, #page1 .inline-input { font-size: 7.8pt !important; }

  /* Page 2 – Tables (this was causing extra pages) */
  #page2 { break-before: page !important; page-break-before: always !important; }
  table.mat-table { font-size: 6.4pt !important; table-layout: fixed !important; line-height: 1.05 !important; }
  table.mat-table th, table.mat-table td { padding: 0.5px 1px !important; font-size: 6.4pt !important; }
  table.mat-table tr { break-inside: avoid !important; page-break-inside: avoid !important; }

  .footer-fields { margin-top: 4px !important; font-size: 7.4pt !important; }
}

@media print and (-webkit-min-device-pixel-ratio: 2) {
  body { background: lime !important; } /* ← Safari-specific test color */
  @page { margin: 0.05in !important; }
  .form-page { padding: 4px 7px !important; }
  html, body { font-size: 7.4pt !important; }
  table.mat-table { font-size: 6pt !important; }
}
