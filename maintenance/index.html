<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Always On Generators - Maintenance Report</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#FBBF24">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AOG Forms">
<style>
:root {
  --cyan: #D97706;
  --cyan-dim: #B45309;
  --cyan-dark: #92400E;
  --amber: #D97706;
  --amber-dim: #B45309;
  --green: #059669;
  --red: #DC2626;
  --bg: #FFFFFF;
  --bg2: #FFFFFF;
  --bg3: #F8F8F8;
  --bg4: #F0F0F0;
  --panel: #FFFFFF;
  --panel2: #FAFAFA;
  --border: rgba(217,119,6,0.25);
  --border-bright: rgba(217,119,6,0.5);
  --text: #1F2937;
  --text-muted: #6B7280;
  --text-dim: #9CA3AF;
  --glow: 0 0 8px rgba(217,119,6,0.3), 0 0 20px rgba(217,119,6,0.1);
  --font-display: 'Orbitron', monospace;
  --font-mono: 'Share Tech Mono', monospace;
  --font-body: 'Exo 2', sans-serif;
  --icon-color-primary: #D97706;
  --icon-color-section: #D97706;
}

body.dark-mode {
  --bg: #0A0E27;
  --bg2: #0F1535;
  --bg3: #1A2847;
  --bg4: #243458;
  --panel: #0F1535;
  --panel2: #1A2847;
  --border: rgba(0, 255, 200, 0.08);
  --border-bright: rgba(0, 255, 200, 0.25);
  --text: #E0F7FF;
  --text-muted: #7DD3FC;
  --text-dim: #38BDF8;
  --cyan: #00FFC8;
  --cyan-dim: #06B6D4;
  --cyan-dark: #0891B2;
  --amber: #D97706;
  --amber-dim: #B45309;
  --green: #10B981;
  --red: #F43F5E;
  --icon-color-primary: #00FFC8;
  --icon-color-section: #00FFC8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  width: 100%;
  margin: 0 auto;
  padding: 0;
  padding-bottom: max(0px, env(safe-area-inset-bottom, 0px));
  -webkit-text-size-adjust: 100%;
  overflow-x: hidden;
  transition: background-color 0.3s ease, color 0.3s ease;
  min-height: -webkit-fill-available;
  min-height: 100vh;
}

body.dark-mode {
  background: linear-gradient(
    135deg,
    #0A0E27 0%,
    #0F1535 25%,
    #0A1628 50%,
    #0F1535 75%,
    #0A0E27 100%
  );
  background-attachment: fixed;
  background-size: 400% 400%;
}

.page {
  width: 100%;
  max-width: 850px;
  margin: 0 auto;
  background: var(--panel);
  border: 2px solid var(--cyan);
  box-shadow: 0 0 0 1px rgba(217,119,6,0.1), 0 0 40px rgba(217,119,6,0.08), inset 0 0 60px rgba(255,255,255,0.8);
  position: relative;
  display: flex;
  flex-direction: column;
  min-height: -webkit-fill-available;
  min-height: 100vh;
  padding: 0;
  box-sizing: border-box;
  transition: background-color 0.3s ease, box-shadow 0.3s ease;
  flex-shrink: 0;
  overflow-x: hidden;
}

body.dark-mode .page {
  background: linear-gradient(
    135deg,
    rgba(15, 21, 53, 0.95) 0%,
    rgba(10, 14, 39, 0.98) 100%
  );
  border-color: #00FFC8;
  box-shadow: 
    0 0 1px rgba(0, 255, 200, 0.3),
    0 0 20px rgba(0, 255, 200, 0.15),
    0 0 40px rgba(59, 130, 246, 0.08),
    inset 0 0 60px rgba(0, 255, 200, 0.02);
}

/* Corner accents */
.page::before, .page::after {
  content: '';
  position: absolute;
  width: 24px; height: 24px;
  border-color: var(--cyan);
  border-style: solid;
  z-index: 10;
}
.page::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
.page::after  { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
.page-corner-bl, .page-corner-br {
  position: absolute;
  width: 24px; height: 24px;
  border-color: var(--cyan);
  border-style: solid;
  z-index: 10;
  pointer-events: none;
}
.page-corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
.page-corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

@media (max-width: 768px) {
  body { padding: 0; }
  .page { box-shadow: none; border: none; max-width: 100%; }
  .page::before, .page::after,
  .page-corner-bl, .page-corner-br { display: none; }

  .header {
    flex-wrap: nowrap;
    gap: 6px;
    padding: 6px 8px;
    min-height: auto;
    justify-content: space-between;
  }

  .header-logo {
    flex: 0 1 auto;
    min-width: 0;
    overflow: hidden;
  }

  .logo-img {
    width: 36px;
    height: 36px;
  }

  .company-name {
    font-size: 0.75rem !important;
    letter-spacing: 0.5px !important;
    white-space: nowrap;
  }

  .doc-title {
    font-size: 0.75rem !important;
    letter-spacing: 1px !important;
    white-space: nowrap;
  }
}

/* ── HEADER ── */
.header {
  background: var(--panel);
  padding: 6px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
  border-bottom: 1px solid var(--border-bright);
  position: relative;
  overflow: hidden;
  min-height: 56px;
  page-break-after: avoid;
  break-after: avoid;
  margin: 0;
  flex-shrink: 0;
  transition: all 0.3s ease;
  width: 100%;
  box-sizing: border-box;
}

body.dark-mode .header {
  background: linear-gradient(
    90deg,
    rgba(15, 21, 53, 0.9) 0%,
    rgba(26, 40, 71, 0.8) 50%,
    rgba(15, 21, 53, 0.9) 100%
  );
  border-bottom-color: rgba(0, 255, 200, 0.25);
  box-shadow: 
    0 2px 8px rgba(0, 0, 0, 0.5),
    0 0 20px rgba(0, 255, 200, 0.08),
    inset 0 1px 0 rgba(0, 255, 200, 0.1);
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), var(--amber), var(--cyan), transparent);
}

body.dark-mode .header::after {
  background: linear-gradient(
    90deg,
    transparent,
    #00FFC8,
    #3B82F6,
    #00FFC8,
    transparent
  );
  opacity: 0.6;
}

.header-logo { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }

.logo-img {
  width: 40px; 
  height: 40px;
  flex-shrink: 0;
  object-fit: contain;
  filter: drop-shadow(0 0 8px rgba(217,119,6,0.4)) brightness(1.1);
}

.company-name {
  font-family: var(--font-display);
  font-size: 0.85rem;
  color: var(--cyan);
  letter-spacing: 2px;
  line-height: 1.1;
  text-shadow: 0 0 12px rgba(217,119,6,0.2);
  font-weight: 700;
  transition: all 0.3s ease;
}

body.dark-mode .company-name {
  color: #00FFC8;
  text-shadow: 
    0 0 10px #00FFC8,
    0 0 20px rgba(0, 255, 200, 0.5),
    0 0 30px rgba(59, 130, 246, 0.3),
    0 0 40px rgba(0, 255, 200, 0.2);
  letter-spacing: 3px;
}

.doc-title {
  font-family: var(--font-display);
  font-size: 0.9rem;
  color: var(--amber);
  letter-spacing: 3px;
  text-shadow: 0 0 12px rgba(217,119,6,0.2);
  font-weight: 500;
  white-space: nowrap;
  transition: all 0.3s ease;
}

body.dark-mode .doc-title {
  color: #00FFC8 !important;
  text-shadow: 
    0 0 12px #00FFC8,
    0 0 20px rgba(0, 255, 200, 0.5),
    0 0 30px rgba(0, 255, 200, 0.3) !important;
  letter-spacing: 4px;
}

/* ── THEME TOGGLE BUTTON ── */
.theme-toggle-btn {
  position: relative;
  width: 36px;
  height: 36px;
  padding: 5px;
  border: 1px solid rgba(217, 119, 6, 0.4);
  background: rgba(217, 119, 6, 0.05);
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--cyan);
  transition: all 0.3s ease;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  flex-shrink: 0;
  z-index: 100;
}

body.dark-mode .theme-toggle-btn {
  background: rgba(0, 255, 200, 0.08);
  border-color: rgba(0, 255, 200, 0.2);
  color: #00FFC8;
}

.theme-toggle-btn:hover {
  border-color: var(--cyan);
  background: rgba(217, 119, 6, 0.1);
  box-shadow: var(--glow);
  transform: scale(1.08);
}

body.dark-mode .theme-toggle-btn:hover {
  background: rgba(0, 255, 200, 0.12);
  border-color: #00FFC8;
  box-shadow: 
    0 0 12px rgba(0, 255, 200, 0.3),
    inset 0 0 8px rgba(0, 255, 200, 0.05);
  transform: scale(1.1);
}

.theme-toggle-btn:active { transform: scale(0.95); }

.theme-icon {
  width: 16px;
  height: 16px;
  transition: all 0.3s ease;
  position: absolute;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke: var(--icon-color-primary) !important;
  color: var(--icon-color-primary) !important;
}

.theme-icon.theme-icon-moon { opacity: 0; }

body.dark-mode .theme-icon { opacity: 0; transform: rotate(-180deg); }
body.dark-mode .theme-icon.theme-icon-moon { opacity: 1; transform: rotate(0deg); }

/* ── TOOLBAR ── */
.toolbar {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 4px 8px;
  display: flex;
  gap: 4px;
  align-items: center;
  flex-wrap: wrap;
  flex-shrink: 0;
  transition: all 0.3s ease;
}

body.dark-mode .toolbar {
  background: linear-gradient(
    90deg,
    rgba(15, 21, 53, 0.8) 0%,
    rgba(26, 40, 71, 0.6) 100%
  );
  border-bottom-color: rgba(0, 255, 200, 0.1);
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 5px 10px;
  border: 1px solid rgba(217,119,6,0.4);
  background: rgba(217,119,6,0.05);
  font-family: var(--font-display);
  font-size: 0.55rem;
  font-weight: 500;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  cursor: pointer;
  color: var(--cyan);
  white-space: nowrap;
  min-height: 30px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: all 0.15s;
  clip-path: polygon(4px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%);
  position: relative;
  overflow: hidden;
}

body.dark-mode .btn {
  background: rgba(0, 255, 200, 0.08);
  border-color: rgba(0, 255, 200, 0.25);
  color: #00FFC8;
  text-shadow: 0 0 4px rgba(0, 255, 200, 0.3);
}

.btn:hover { 
  border-color: var(--cyan); 
  color: var(--cyan); 
  box-shadow: var(--glow); 
}

body.dark-mode .btn:hover {
  background: rgba(0, 255, 200, 0.12);
  border-color: #00FFC8;
  box-shadow: 
    0 0 12px rgba(0, 255, 200, 0.25),
    inset 0 0 12px rgba(0, 255, 200, 0.05);
  text-shadow: 0 0 8px rgba(0, 255, 200, 0.6);
}

.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }

/* ── CONTENT ── */
.content { 
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  flex: 1;
  width: 100%;
  box-sizing: border-box;
  min-height: 0;
  overflow-y: auto;
}

@media (max-width: 480px) { .content { padding: 6px 4px; } }

/* ── SECTIONS ── */
.section {
  border: 1px solid var(--border);
  margin-bottom: 4px;
  background: var(--panel);
  position: relative;
  transition: all 0.3s ease;
  page-break-inside: avoid;
  break-inside: avoid;
}

body.dark-mode .section {
  background: linear-gradient(
    135deg,
    rgba(26, 40, 71, 0.6) 0%,
    rgba(15, 21, 53, 0.8) 100%
  );
  border-color: rgba(0, 255, 200, 0.15);
  box-shadow: 
    0 0 1px rgba(0, 255, 200, 0.1),
    inset 0 0 20px rgba(0, 255, 200, 0.02);
}

.section::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--cyan), transparent 60%);
  transition: all 0.3s ease;
}

body.dark-mode .section::before {
  background: linear-gradient(
    90deg,
    #00FFC8,
    rgba(0, 255, 200, 0.3) 40%,
    transparent 100%
  );
  opacity: 0.7;
}

.section-header {
  background: var(--bg3);
  color: var(--cyan);
  font-family: var(--font-display);
  font-size: 0.6rem;
  letter-spacing: 2.5px;
  padding: 3px 10px;
  border-bottom: 1px solid var(--border);
  text-shadow: 0 0 6px rgba(217,119,6,0.15);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.3s ease;
  text-transform: uppercase;
}

body.dark-mode .section-header {
  background: linear-gradient(
    90deg,
    rgba(26, 40, 71, 0.8) 0%,
    rgba(36, 52, 88, 0.6) 100%
  );
  color: #00FFC8;
  border-bottom-color: rgba(0, 255, 200, 0.2);
  text-shadow: 
    0 0 8px rgba(0, 255, 200, 0.4),
    0 0 16px rgba(59, 130, 246, 0.15);
}

.section-header::before {
  content: '';
  display: inline-block;
  width: 4px; height: 4px;
  background: var(--cyan);
  box-shadow: 0 0 4px var(--cyan);
  flex-shrink: 0;
  animation: pulse 2s ease-in-out infinite;
  transition: all 0.3s ease;
}

body.dark-mode .section-header::before {
  background: #00FFC8;
  box-shadow: 
    0 0 6px #00FFC8,
    0 0 12px rgba(0, 255, 200, 0.5);
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

.section-body { 
  padding: 4px 8px;
  transition: all 0.3s ease;
}

/* ── TWO-COLUMN LAYOUT ── */
.two-column {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  width: 100%;
  margin-bottom: 4px;
}

.two-column .section {
  margin-bottom: 0;
}

@media (max-width: 820px) {
  .two-column {
    grid-template-columns: 1fr;
    gap: 4px;
    margin-bottom: 4px;
  }
}

/* ── FIELD ROWS ── */
.field-row {
  display: flex;
  align-items: center;
  gap: 3px;
  margin-bottom: 3px;
  flex-wrap: wrap;
}
.field-row:last-child { margin-bottom: 0; }

label {
  font-size: 0.5rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  white-space: nowrap;
  flex-shrink: 0;
  user-select: none;
  line-height: 1;
  font-family: var(--font-display);
  transition: color 0.3s ease;
}

body.dark-mode label {
  color: #7DD3FC;
}

/* ── INPUTS ── */
input[type="text"],
input[type="email"],
input[type="tel"],
input[type="date"],
input[type="number"],
textarea,
select {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text);
  background: var(--panel);
  border: none;
  border-bottom: 1.5px solid rgba(217,119,6,0.25);
  padding: 2px 4px;
  outline: none;
  width: 100%;
  transition: all 0.2s;
  border-radius: 0;
  min-height: 28px;
  -webkit-appearance: none;
  appearance: none;
  caret-color: var(--cyan);
}

body.dark-mode input[type="text"],
body.dark-mode input[type="email"],
body.dark-mode input[type="tel"],
body.dark-mode input[type="date"],
body.dark-mode input[type="number"],
body.dark-mode textarea,
body.dark-mode select {
  background: rgba(10, 14, 39, 0.6);
  border-bottom-color: rgba(0, 255, 200, 0.2);
  color: #E0F7FF;
  caret-color: #00FFC8;
  box-shadow: 
    inset 0 1px 3px rgba(0, 0, 0, 0.5),
    inset 0 0 8px rgba(0, 255, 200, 0.05);
}

input[type="date"] {
  min-height: 28px;
  padding: 2px 3px;
  cursor: pointer;
  color-scheme: light;
}

body.dark-mode input[type="date"] {
  color-scheme: dark;
}

input::placeholder, textarea::placeholder { 
  color: var(--text-dim) !important;
  opacity: 0.4;
  font-size: 0.65rem;
}

input[type="text"]:focus,
input[type="email"]:focus,
input[type="tel"]:focus,
input[type="date"]:focus,
input[type="number"]:focus,
textarea:focus,
select:focus {
  border-bottom-color: var(--cyan);
  background: rgba(217,119,6,0.04);
  box-shadow: 0 1px 0 0 rgba(217,119,6,0.3), 0 0 8px rgba(217,119,6,0.08);
}

body.dark-mode input[type="text"]:focus,
body.dark-mode input[type="email"]:focus,
body.dark-mode input[type="tel"]:focus,
body.dark-mode input[type="date"]:focus,
body.dark-mode input[type="number"]:focus,
body.dark-mode textarea:focus,
body.dark-mode select:focus {
  border-bottom-color: #00FFC8;
  background: rgba(26, 40, 71, 0.8);
  box-shadow: 
    inset 0 0 8px rgba(0, 255, 200, 0.1),
    0 0 8px rgba(0, 255, 200, 0.15),
    0 0 16px rgba(59, 130, 246, 0.08);
}

input.short { width: 48px; min-width: 48px; flex-shrink: 0; }
input.med   { width: 80px; min-width: 60px; flex: 0 0 auto; }
input.long  { flex: 1; min-width: 70px; }

textarea {
  width: 100%;
  resize: vertical;
  border: 1px solid rgba(217,119,6,0.15);
  padding: 2px 3px;
  margin-top: 1px;
  min-height: auto !important;
  max-height: none !important;
  background: var(--panel);
  color: var(--text);
  transition: all 0.3s ease;
  font-size: 0.65rem;
  line-height: 1.2;
}

body.dark-mode textarea {
  background: rgba(10, 14, 39, 0.6);
  border-color: rgba(0, 255, 200, 0.1);
  color: #E0F7FF;
}

textarea:focus { 
  border-color: var(--cyan); 
  box-shadow: 0 0 6px rgba(217,119,6,0.1); 
}

body.dark-mode textarea:focus {
  border-color: #00FFC8;
  box-shadow: 0 0 6px rgba(0, 255, 200, 0.15);
}

/* ── CHECK GROUPS ── */
.check-group {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  align-items: center;
  margin-top: 0;
  width: 100%;
}

.check-item {
  display: flex;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  user-select: none;
  min-height: 24px;
  padding: 1px 5px 1px 3px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  border: 0.5px solid rgba(217,119,6,0.25);
  background: rgba(217,119,6,0.02);
  transition: all 0.15s;
  clip-path: polygon(3px 0%, 100% 0%, calc(100% - 3px) 100%, 0% 100%);
  font-size: 0.5rem;
}

body.dark-mode .check-item {
  background: rgba(26, 40, 71, 0.3);
  border-color: rgba(0, 255, 200, 0.1);
}

.check-item:hover {
  border-color: rgba(217,119,6,0.4);
  background: rgba(217,119,6,0.05);
}

body.dark-mode .check-item:hover {
  background: rgba(36, 52, 88, 0.4);
  border-color: rgba(0, 255, 200, 0.2);
  box-shadow: 0 0 4px rgba(0, 255, 200, 0.08);
}

.check-item:has(input:checked) {
  background: rgba(217,119,6,0.08);
  border-color: rgba(217,119,6,0.5);
  box-shadow: 0 0 4px rgba(217,119,6,0.1), inset 0 0 4px rgba(217,119,6,0.02);
}

body.dark-mode .check-item:has(input:checked) {
  background: rgba(0, 255, 200, 0.06);
  border-color: rgba(0, 255, 200, 0.3);
  box-shadow: 
    0 0 6px rgba(0, 255, 200, 0.1),
    inset 0 0 4px rgba(0, 255, 200, 0.03);
}

.check-item input[type="checkbox"],
.check-item input[type="radio"] {
  width: 11px !important;
  height: 11px !important;
  min-height: 11px !important;
  min-width: 11px !important;
  accent-color: var(--cyan);
  cursor: pointer;
  flex-shrink: 0;
  border: none;
  border-bottom: none;
  padding: 0;
  background: none;
  transition: all 0.3s ease;
}

body.dark-mode .check-item input[type="checkbox"],
body.dark-mode .check-item input[type="radio"] {
  accent-color: #00FFC8;
}

.check-item span {
  font-family: var(--font-display);
  font-size: 0.5rem;
  font-weight: 500;
  letter-spacing: 0.6px;
  color: var(--text);
  text-transform: uppercase;
  transition: color 0.15s;
}

body.dark-mode .check-item span {
  color: #E0F7FF;
}

.check-item:has(input:checked) span {
  color: var(--cyan);
  text-shadow: 0 0 2px rgba(217,119,6,0.3);
}

body.dark-mode .check-item:has(input:checked) span {
  color: #00FFC8;
  text-shadow: 0 0 4px rgba(0, 255, 200, 0.4);
}

/* ── TEST GRID LAYOUT ── */
.test-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 8px;
  width: 100%;
}

.test-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.test-item label {
  min-width: 75px;
  white-space: nowrap;
}

@media (max-width: 768px) {
  .test-grid {
    grid-template-columns: 1fr;
    gap: 10px;
  }
}

/* ── Y/N TOGGLE ── */
.yn-group {
  display: inline-flex;
  border: 0.5px solid rgba(217,119,6,0.25);
  overflow: hidden;
  flex-shrink: 0;
  background: var(--panel);
  transition: all 0.3s ease;
  height: 26px;
}

body.dark-mode .yn-group {
  background: rgba(15, 21, 53, 0.7);
  border-color: rgba(0, 255, 200, 0.1);
}

.yn-group input[type="radio"] { display: none; }

.yn-group .yn-label {
  padding: 0 8px;
  font-family: var(--font-display);
  font-size: 0.55rem;
  font-weight: 600;
  letter-spacing: 1.2px;
  cursor: pointer;
  color: var(--text-muted);
  background: transparent;
  border: none;
  min-height: 26px;
  display: flex;
  align-items: center;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: all 0.15s;
}

body.dark-mode .yn-group .yn-label {
  color: #7DD3FC;
}

.yn-group .yn-label:first-of-type { border-right: 0.5px solid rgba(217,119,6,0.15); }

body.dark-mode .yn-group .yn-label:first-of-type {
  border-right-color: rgba(0, 255, 200, 0.08);
}

.yn-group .yn-label:hover { 
  background: rgba(217,119,6,0.05); 
  color: var(--text); 
}

body.dark-mode .yn-group .yn-label:hover {
  background: rgba(0, 255, 200, 0.04);
  color: #E0F7FF;
  box-shadow: 0 0 4px rgba(0, 255, 200, 0.08);
}

.yn-group .yn-y:checked + .yn-label-y {
  background: rgba(5,150,105,0.1);
  color: var(--green);
  text-shadow: 0 0 4px rgba(5,150,105,0.3);
  box-shadow: inset 0 0 6px rgba(5,150,105,0.05);
}

.yn-group .yn-n:checked + .yn-label-n {
  background: rgba(220,38,38,0.1);
  color: var(--red);
  text-shadow: 0 0 4px rgba(220,38,38,0.3);
  box-shadow: inset 0 0 6px rgba(220,38,38,0.05);
}

body.dark-mode .yn-group .yn-y:checked + .yn-label-y {
  background: rgba(16, 185, 129, 0.12);
  color: #10B981;
  text-shadow: 0 0 6px rgba(16, 185, 129, 0.3);
  box-shadow: 
    0 0 6px rgba(16, 185, 129, 0.15),
    inset 0 0 6px rgba(16, 185, 129, 0.08);
}

body.dark-mode .yn-group .yn-n:checked + .yn-label-n {
  background: rgba(244, 63, 94, 0.12);
  color: #F43F5E;
  text-shadow: 0 0 6px rgba(244, 63, 94, 0.3);
  box-shadow: 
    0 0 6px rgba(244, 63, 94, 0.15),
    inset 0 0 6px rgba(244, 63, 94, 0.08);
}

/* ── FOOTER ── */
.footer {
  background: var(--panel);
  padding: 4px 10px;
  padding-bottom: max(4px, env(safe-area-inset-bottom, 4px));
  display: flex;
  justify-content: space-between;

body.dark-mode .footer-text {

}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }

/* ═══════════════════════════════════════════════════════════════════════════
   MOBILE SAFARI — SINGLE-PAGE PRINT FIX  (Ver 1.1)
   JS detects iOS/iPadOS Safari and adds "mobile-safari" to <body>.
   Strategy: one master zoom (~14% reduction) handles all proportional
   scaling — fonts, radios, checkboxes, Y/N toggles, inputs, spacing.
   Only three targeted overrides are needed beyond that:
     1. Enforce two-column layout (mobile viewport collapses it)
     2. Reduce fixed-px textarea heights to match the zoom ratio
     3. Trim page padding slightly to recover extra vertical room
   ═══════════════════════════════════════════════════════════════════════════ */
@media print {

  /* ── 1. MASTER SCALE — let zoom do all proportional work ── */
  body.mobile-safari .page {
    zoom: 0.86;          /* ~14% reduction; content was ~1.25 pages → fits 1 */
    padding: 18px !important;  /* slightly tighter than desktop's 24px        */
  }

  /* ── 2. TWO-COLUMN: mobile viewport width triggers the ≤820px breakpoint ──
          which collapses Battery + Generator into a single column.
          Force it back to side-by-side for print.                           */
  body.mobile-safari .two-column {
    grid-template-columns: 1fr 1fr !important;
  }

  /* ── 3. TEXTAREA FIXED HEIGHTS — zoom scales layout but not explicit
          height/min-height values in all WebKit builds; set them manually
          at the same ~0.86 ratio so they don't exceed their natural space. */
  body.mobile-safari #batnotes,
  body.mobile-safari #gennotes {
    min-height: 53px !important;   /* 62px × 0.86 */
    height:     53px !important;
  }
  body.mobile-safari #oilnotes,
  body.mobile-safari #gasnotes,
  body.mobile-safari #tsnotes {
    min-height: 26px !important;   /* 30px × 0.86 */
    height:     26px !important;
  }

} /* end mobile-safari @media print */

<script>
// ── Mobile Safari detection for single-page print ──────────────────────────
// Runs immediately (before DOMContentLoaded) so the class is present when
// print CSS is evaluated.  Only targets iOS/iPadOS Safari — Chrome, Firefox,
// Edge, and Opera on iOS are excluded via their specific UA tokens.
(function () {
  var ua = navigator.userAgent;
  if (
    /iP(hone|od|ad)/.test(ua) &&
    /WebKit/.test(ua) &&
    !/CriOS|FxiOS|OPiOS|EdgiOS|mercury/.test(ua)
  ) {
    // Set on <html> immediately; set on <body> once it exists
    document.documentElement.classList.add('mobile-safari');
    if (document.body) {
      document.body.classList.add('mobile-safari');
    } else {
      document.addEventListener('DOMContentLoaded', function () {
        document.body.classList.add('mobile-safari');
      });
    }
  }
})();
// ──────────────────────────────────────────────────────────────────────────

const THEME_KEY = 'aog_maint_theme';
const DRAFT_KEY = 'aog_maint_draft';

function getInitialTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved) return saved;
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    return 'dark';
  }
  return 'light';
}

function applyTheme(theme) {
  const body = document.body;
  if (theme === 'dark') {
    body.classList.add('dark-mode');
  } else {
    body.classList.remove('dark-mode');
  }
  try {
    localStorage.setItem(THEME_KEY, theme);
  } catch (e) {}
}

function toggleTheme() {
  const isDark = document.body.classList.contains('dark-mode');
  applyTheme(isDark ? 'light' : 'dark');
}

function setupThemeToggle() {
  const btn = document.getElementById('theme-toggle-btn');
  if (!btn) return;
  btn.addEventListener('click', toggleTheme);
}

function saveDraft() {
  const data = {};
  document.querySelectorAll('input, textarea').forEach(el => {
    const key = el.id || el.name;
    if (!key) return;
    
    if (el.type === 'checkbox') {
      if (!data[key]) data[key] = [];
      if (el.checked) data[key].push(el.value);
    } else if (el.type === 'radio') {
      if (el.checked) data[key] = el.value;
    } else {
      if (data[key] === undefined) data[key] = el.value;
    }
  });
  
  try {
    localStorage.setItem(DRAFT_KEY, JSON.stringify(data));
  } catch (e) {}
}

function restoreDraft() {
  const saved = localStorage.getItem(DRAFT_KEY);
  if (!saved) return;
  
  try {
    const data = JSON.parse(saved);
    document.querySelectorAll('input, textarea').forEach(el => {
      const key = el.id || el.name;
      if (!key || data[key] === undefined) return;
      
      if (el.type === 'checkbox') {
        if (Array.isArray(data[key])) {
          el.checked = data[key].includes(el.value);
        }
      } else if (el.type === 'radio') {
        if (el.value === data[key]) el.checked = true;
      } else {
        el.value = data[key];
      }
    });
  } catch (e) {}
}

function clearForm() {
  if (!confirm('Clear all fields?')) return;
  document.querySelectorAll('input[type="text"], input[type="date"], input[type="number"], textarea').forEach(el => {
    el.value = '';
  });
  document.querySelectorAll('input[type="checkbox"], input[type="radio"]').forEach(el => {
    el.checked = false;
  });
  localStorage.removeItem(DRAFT_KEY);
}

function printForm() {
  const wasDark = document.body.classList.contains('dark-mode');

  const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

  if (isSafari) {
    alert('⚠️ SAFARI PRINT TIP\n\nFor best results, in the print preview:\n\n1. Tap the scale slider/zoom\n2. Scale DOWN by 1\n3. Then scale BACK UP by 1\n\nThis ensures the page fits properly on one page.');
  }

  const printStyle = document.createElement('style');
  printStyle.id = 'force-print-light';
  printStyle.textContent = `
    *, *::before, *::after {
      background: white !important;
      color: #1F2937 !important;
      box-shadow: none !important;
      text-shadow: none !important;
      border-color: rgba(217,119,6,0.4) !important;
      animation: none !important;
      transition: none !important;
    }
    .page { border: 1.5px solid #D97706 !important; min-height: 0 !important; }
    .company-name, .doc-title { color: #D97706 !important; }
    .section-header { background: #f5f5f5 !important; color: #D97706 !important; }
    .footer-text { color: #9CA3AF !important; }
    .footer { padding-bottom: 4px !important; }
    .content { flex-grow: 0 !important; }
    .toolbar, button, .theme-toggle-btn { display: none !important; }
  `;
  document.head.appendChild(printStyle);

  if (wasDark) document.body.classList.remove('dark-mode');

  setTimeout(() => {
    window.print();
    setTimeout(() => {
      const el = document.getElementById('force-print-light');
      if (el) el.remove();
      if (wasDark) document.body.classList.add('dark-mode');
    }, 1000);
  }, 250);
}


function setStatus(msg) {
  const el = document.getElementById('save-status');
  if (el) el.textContent = msg;
}

function capturePageToCanvas() {
  return new Promise((resolve, reject) => {
    const page = document.getElementById('page');

    const prevWidth = page.style.width;
    const prevMaxWidth = page.style.maxWidth;
    const prevBodyPad = document.body.style.padding;

    const CAPTURE_WIDTH = 1050;
    const PAPER_RATIO = 11 / 8.5;

    page.style.width = CAPTURE_WIDTH + 'px';
    page.style.maxWidth = CAPTURE_WIDTH + 'px';
    document.body.style.padding = '0';

    const forceStyle = document.createElement('style');
    forceStyle.id = 'capture-force-style';
    forceStyle.textContent = `
      .two-column {
        display: grid !important;
        grid-template-columns: 1fr 1fr !important;
      }
      .toolbar { display: none !important; }
      .theme-toggle-btn { display: none !important; }
    `;
    document.head.appendChild(forceStyle);

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        html2canvas(page, {
          scale: 2,
          useCORS: true,
          allowTaint: true,
          backgroundColor: '#ffffff',
          logging: false,
          width: CAPTURE_WIDTH,
          height: page.scrollHeight,
          windowWidth: CAPTURE_WIDTH,
          scrollX: 0,
          scrollY: 0,
          ignoreElements: el =>
            el.classList.contains('toolbar') ||
            el.classList.contains('theme-toggle-btn')
        }).then(srcCanvas => {
          page.style.width = prevWidth;
          page.style.maxWidth = prevMaxWidth;
          document.body.style.padding = prevBodyPad;
          const fs = document.getElementById('capture-force-style');
          if (fs) fs.remove();

          const LETTER_W = 1632;
          const LETTER_H = Math.round(LETTER_W * PAPER_RATIO);

          const letterCanvas = document.createElement('canvas');
          letterCanvas.width = LETTER_W;
          letterCanvas.height = LETTER_H;
          const ctx = letterCanvas.getContext('2d');

          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, LETTER_W, LETTER_H);

          const scale = LETTER_W / srcCanvas.width;
          const scaledH = Math.round(srcCanvas.height * scale);
          const drawH = Math.min(scaledH, LETTER_H);
          ctx.drawImage(srcCanvas, 0, 0, srcCanvas.width, srcCanvas.height,
                        0, 0, LETTER_W, drawH);

          resolve(letterCanvas);
        }).catch(err => {
          page.style.width = prevWidth;
          page.style.maxWidth = prevMaxWidth;
          document.body.style.padding = prevBodyPad;
          const fs = document.getElementById('capture-force-style');
          if (fs) fs.remove();
          reject(err);
        });
      });
    });
  });
}

function saveForIPhone() {
  setStatus('Rendering... please wait');
  const wasDark = document.body.classList.contains('dark-mode');
  if (wasDark) document.body.classList.remove('dark-mode');

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:9999;display:flex;flex-direction:column;align-items:stretch;justify-content:flex-start;padding:0;overflow-y:auto;-webkit-overflow-scrolling:touch;box-sizing:border-box;';

  const closeBtn = document.createElement('button');
  closeBtn.style.cssText = 'background:#DC2626;color:#fff;border:none;padding:12px 20px;font-size:14px;cursor:pointer;font-weight:bold;flex-shrink:0;width:100%;text-align:center;letter-spacing:1px;';
  closeBtn.textContent = 'X Close';

  const lbl = document.createElement('div');
  lbl.style.cssText = 'color:#ccc;font-size:13px;margin:8px 0;text-align:center;line-height:1.6;padding:0 12px;flex-shrink:0;';
  lbl.textContent = 'Rendering your form...';

  const img = document.createElement('img');
  img.style.cssText = 'width:100%;display:block;border:none;';
  img.alt = 'AOG Maintenance Report';

  overlay.appendChild(closeBtn);
  overlay.appendChild(lbl);
  overlay.appendChild(img);
  document.body.appendChild(overlay);

  closeBtn.onclick = () => {
    document.body.removeChild(overlay);
    if (wasDark) document.body.classList.add('dark-mode');
    setStatus('');
  };

  setTimeout(() => {
    capturePageToCanvas().then(canvas => {
      img.src = canvas.toDataURL('image/jpeg', 0.92);
      lbl.innerHTML = '<b>Long-press the image below</b><br>then tap "Add to Photos"';
      lbl.style.color = '#4ade80'; lbl.style.padding = '0 12px';
      setStatus('Ready - long-press image to save.');
      if (wasDark) document.body.classList.add('dark-mode');
    }).catch(() => {
      lbl.textContent = 'Render failed. Try the PDF button instead.';
      lbl.style.color = '#f87171';
      setStatus('Render failed.');
      if (wasDark) document.body.classList.add('dark-mode');
    });
  }, 250);
}

function saveForAndroid() {
  setStatus('Rendering... please wait');
  const wasDark = document.body.classList.contains('dark-mode');
  if (wasDark) document.body.classList.remove('dark-mode');
  setTimeout(() => {
    capturePageToCanvas().then(canvas => {
      const link = document.createElement('a');
      link.download = 'AOG_Maintenance_Report.jpg';
      link.href = canvas.toDataURL('image/jpeg', 0.92);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setStatus('Saved to Downloads folder.');
      setTimeout(() => setStatus(''), 4000);
      if (wasDark) document.body.classList.add('dark-mode');
    }).catch(() => {
      setStatus('Render failed. Try PDF instead.');
      if (wasDark) document.body.classList.add('dark-mode');
    });
  }, 250);
}

// Auto-save every 30 seconds
setInterval(saveDraft, 30000);
document.addEventListener('change', saveDraft);
document.addEventListener('input', saveDraft);

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
  const todayInput = document.getElementById('date');
  if (todayInput && !todayInput.value) {
    todayInput.value = new Date().toISOString().split('T')[0];
  }
  
  const initialTheme = getInitialTheme();
  applyTheme(initialTheme);
  setupThemeToggle();
  restoreDraft();
});

// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('./sw.js').then(function (reg) {
      reg.addEventListener('updatefound', function () {
        var newWorker = reg.installing;
        newWorker.addEventListener('statechange', function () {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            console.log('[AOG SW] Update available — reload to apply.');
          }
        });
      });
    }).catch(function (err) {
      console.warn('[AOG SW] Registration failed:', err);
    });
  });
}
